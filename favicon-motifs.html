<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Favicon Motifs</title>
  <style>
    :root {
      --bg: #fbfdff;
      --accent: #3878b5;
      --line: rgba(56, 120, 181, 0.22);
      --panel: rgba(255, 255, 255, 0.78);
      --shadow: 0 18px 40px rgba(34, 48, 61, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(95, 158, 212, 0.12), transparent 34%),
        linear-gradient(180deg, #ffffff, var(--bg));
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .page {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
    }

    .card {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .swatch {
      display: grid;
      place-items: center;
      min-height: 148px;
      border-radius: 14px;
      background:
        linear-gradient(135deg, rgba(56, 120, 181, 0.08), rgba(56, 120, 181, 0.02)),
        #ffffff;
      border: 1px solid rgba(56, 120, 181, 0.16);
    }

    .swatch.dark {
      background:
        radial-gradient(circle at top, rgba(105, 167, 218, 0.18), transparent 40%),
        #243340;
    }

    .sizes {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .sizes img {
      display: block;
    }

    .sizes img:nth-child(1) {
      width: 16px;
      height: 16px;
    }

    .sizes img:nth-child(2) {
      width: 32px;
      height: 32px;
    }

    .sizes img:nth-child(3) {
      width: 64px;
      height: 64px;
    }

    .index {
      margin: 10px 0 0;
      color: var(--accent);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-align: center;
    }
  </style>
</head>
